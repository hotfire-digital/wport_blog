backend:
  name: github
  repo: ericlu-sys/wport_blog
  branch: master
  base_url: https://wport-decap-oauth.wport.workers.dev
  auth_endpoint: auth

publish_mode: editorial_workflow
media_folder: "public/images/uploads"
public_folder: "/images/uploads"
locale: "zh_Hant"

collections:
  - name: "posts"
    label: "文章"
    folder: "src/content/posts"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - {
          label: "發布日期",
          name: "publishDate",
          widget: "datetime",
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
        }
      - { label: "標籤", name: "tags", widget: "list", required: false }
      - { label: "精選", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "封面圖", name: "cover", widget: "image", required: false }
      - { label: "內文", name: "body", widget: "markdown" }
